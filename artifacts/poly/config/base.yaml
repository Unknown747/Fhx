# ─────────────────────────────────────────────────────────────────────────────
# PolyHFT-Autotrading-V3 — base configuration
#
# Token IDs are NOT required here. The bot auto-fetches and caches live token
# IDs from the Gamma API every 3 minutes (TokenDiscoveryService). If discovery
# fails for a slug, the bot skips that market for the cycle and retries next.
#
# Prices (yes_ask / no_ask etc.) are also refreshed from the CLOB order book
# every cycle via live discovery — the values below are startup fallbacks only.
# ─────────────────────────────────────────────────────────────────────────────

app:
  name: PolyHFT-Autotrading-V3
  environment: production
  mode: paper                 # paper | live | backtest
  log_level: INFO
  loop_interval_ms: 250
  dashboard_refresh_ms: 1000
  max_signals_per_cycle: 12

strategy:
  pair_cost_cap: 0.98
  default_order_size: 25

exchange:
  host: https://clob.polymarket.com
  gamma_host: https://gamma-api.polymarket.com
  websocket_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  chain_id: 137
  quote_token: USDC
  poll_interval_ms: 500
  markets:
    # ── Bitcoin ──────────────────────────────────────────────────────────────
    - asset: BTC
      slug: bitcoin-up-or-down-5-min
      market_type: up_down
      interval_label: 5 min
      prompt: Bitcoin Up or Down - 5 min
      pair_group: btc-up-down-5m
      reference_price: 95000
      yes_ask: 0.51
      no_ask: 0.45
      yes_bid: 0.50
      no_bid: 0.44
      volume_label: "$142K Vol."
    - asset: BTC
      slug: bitcoin-up-or-down-15-min
      market_type: up_down
      interval_label: 15 min
      prompt: Bitcoin Up or Down - 15 min
      pair_group: btc-up-down-15m
      reference_price: 95000
      yes_ask: 0.50
      no_ask: 0.47
      yes_bid: 0.49
      no_bid: 0.46
      volume_label: "$88K Vol."
    # ── Ethereum ─────────────────────────────────────────────────────────────
    - asset: ETH
      slug: ethereum-up-or-down-5-min
      market_type: up_down
      interval_label: 5 min
      prompt: Ethereum Up or Down - 5 min
      pair_group: eth-up-down-5m
      reference_price: 1800
      yes_ask: 0.51
      no_ask: 0.46
      yes_bid: 0.50
      no_bid: 0.45
      volume_label: "$48K Vol."
    - asset: ETH
      slug: ethereum-up-or-down-15-min
      market_type: up_down
      interval_label: 15 min
      prompt: Ethereum Up or Down - 15 min
      pair_group: eth-up-down-15m
      reference_price: 1800
      yes_ask: 0.50
      no_ask: 0.47
      yes_bid: 0.49
      no_bid: 0.46
      volume_label: "$31K Vol."
    # ── Solana ───────────────────────────────────────────────────────────────
    - asset: SOL
      slug: solana-up-or-down-5-min
      market_type: up_down
      interval_label: 5 min
      prompt: Solana Up or Down - 5 min
      pair_group: sol-up-down-5m
      reference_price: 148
      yes_ask: 0.50
      no_ask: 0.47
      yes_bid: 0.49
      no_bid: 0.46
      volume_label: "$62K Vol."
    - asset: SOL
      slug: solana-up-or-down-15-min
      market_type: up_down
      interval_label: 15 min
      prompt: Solana Up or Down - 15 min
      pair_group: sol-up-down-15m
      reference_price: 148
      yes_ask: 0.43
      no_ask: 0.52
      yes_bid: 0.42
      no_bid: 0.51
      volume_label: "$91K Vol."
    # ── XRP ──────────────────────────────────────────────────────────────────
    - asset: XRP
      slug: xrp-up-or-down-15-min
      market_type: up_down
      interval_label: 15 min
      prompt: XRP Up or Down - 15 min
      pair_group: xrp-up-down-15m
      reference_price: 2.20
      yes_ask: 0.43
      no_ask: 0.54
      yes_bid: 0.42
      no_bid: 0.53
      volume_label: "$27K Vol."
    # ── Dogecoin ─────────────────────────────────────────────────────────────
    - asset: DOGE
      slug: dogecoin-up-or-down-15-min
      market_type: up_down
      interval_label: 15 min
      prompt: Dogecoin Up or Down - 15 min
      pair_group: doge-up-down-15m
      reference_price: 0.19
      yes_ask: 0.64
      no_ask: 0.31
      yes_bid: 0.63
      no_bid: 0.30
      volume_label: "$18K Vol."
    # ── BNB ──────────────────────────────────────────────────────────────────
    - asset: BNB
      slug: bnb-up-or-down-15-min
      market_type: up_down
      interval_label: 15 min
      prompt: BNB Up or Down - 15 min
      pair_group: bnb-up-down-15m
      reference_price: 590
      yes_ask: 0.46
      no_ask: 0.50
      yes_bid: 0.45
      no_bid: 0.49
      volume_label: "$24K Vol."

risk:
  starting_capital: 25000.0
  max_gross_exposure: 0.75
  max_net_exposure: 0.35
  max_market_exposure: 0.15
  max_order_notional: 1500.0
  min_order_notional: 20.0
  max_daily_loss: 0.06
  max_drawdown: 0.10
  max_kelly_fraction: 0.15
  min_confidence: 0.55
  fee_bps: 3.5
  slippage_bps: 6.0
  circuit_breaker_cooldown_s: 300

backtesting:
  starting_equity: 25000.0
  fee_bps: 3.5
  slippage_bps: 6.0
  bars_per_year: 105120
  max_signals_per_bar: 12
  win_rate_horizon_bars: 3

monitoring:
  enable_dashboard: true
  enable_json_logs: false
  heartbeat_seconds: 10
